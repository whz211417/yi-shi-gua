<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#151515" />
    <title>易食卦 - 今日吃什么</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="site-header" aria-label="易食卦">
        <a class="brand" href="#casting" aria-label="易食卦，返回起卦处">
          <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
          <span>易食卦</span>
        </a>
        <div class="header-actions">
          <p id="today-date" class="date-stamp" aria-label="今日日期"></p>
          <button id="menu-open-button" class="menu-open-button" type="button" aria-expanded="false" aria-controls="menu-panel">整饬食单</button>
        </div>
      </header>

      <section class="scroll-hero hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">食随其时，味从其心</p>
          <h1 id="page-title"><span>今日食何</span><span>请报一数</span></h1>
          <p class="intro">择其时，定其处，拈一数。今朝一餐，便有着落。</p>
        </div>
        <aside class="oracle-aside" aria-hidden="true">
          <div class="hexagram-seal">
            <span></span><span class="broken"></span><span></span><span class="broken"></span><span class="broken"></span><span></span>
          </div>
          <p class="oracle-order">食卦·其一</p>
          <span class="vermilion-seal">食</span>
          <span class="cloud-mark"></span>
        </aside>
      </section>

      <section id="casting" class="ritual-sheet casting-panel" aria-labelledby="casting-title">
        <div class="section-heading">
          <p class="eyebrow">起一餐卦</p>
          <h2 id="casting-title">请陈其时</h2>
        </div>

        <div class="choice-grid">
          <fieldset id="meal-period" class="choice-group">
            <legend>餐别</legend>
            <div class="segmented-control" role="radiogroup" aria-label="餐别">
              <label><input type="radio" name="meal-period" value="早餐" /><span>早餐</span></label>
              <label><input type="radio" name="meal-period" value="午餐" checked /><span>午餐</span></label>
              <label><input type="radio" name="meal-period" value="晚餐" /><span>晚餐</span></label>
            </div>
          </fieldset>

          <fieldset id="place" class="choice-group">
            <legend>去处</legend>
            <div class="segmented-control" role="radiogroup" aria-label="去处">
              <label><input type="radio" name="place" value="在学校" checked /><span>在学校</span></label>
              <label><input type="radio" name="place" value="校外" /><span>校外</span></label>
              <label><input type="radio" name="place" value="不想走远" /><span>不想走远</span></label>
            </div>
          </fieldset>

          <fieldset id="weather" class="choice-group">
            <legend>天气</legend>
            <div class="segmented-control" role="radiogroup" aria-label="天气">
              <label><input type="radio" name="weather" value="自动以本地日期推演" checked /><span>自动推演</span></label>
              <label><input type="radio" name="weather" value="不考虑" /><span>不考虑</span></label>
              <label><input type="radio" name="weather" value="晴热" /><span>晴热</span></label>
              <label><input type="radio" name="weather" value="下雨" /><span>下雨</span></label>
              <label><input type="radio" name="weather" value="偏冷" /><span>偏冷</span></label>
            </div>
          </fieldset>
        </div>

        <div class="number-row">
          <div class="number-field">
            <label for="number-input">报数</label>
            <div class="number-input-wrap">
              <input id="number-input" type="number" min="1" max="64" inputmode="numeric" value="32" aria-describedby="number-help" />
              <button id="random-number-button" class="random-button" type="button" aria-label="随机生成一至六十四的报数">随机</button>
            </div>
            <p id="number-help">请输入 1-64 的整数</p>
            <p id="calendar-status" class="calendar-status">按北京时间 · 农历时辰合参</p>
          </div>
          <button id="cast-button" class="cast-button" type="button"><span aria-hidden="true">起</span> 拈数起卦</button>
        </div>
      </section>

      <section id="result-card" class="result-card is-empty" aria-labelledby="result-title" aria-live="polite">
        <div class="ink-ritual" aria-hidden="true">
          <span class="ink-ring"></span>
          <span class="seal-mark">食</span>
        </div>
        <div class="result-topline"><span id="result-ordinal">未起卦</span><span class="result-rule"></span><span>今朝一餐</span></div>
        <div class="result-empty" id="result-empty">
          <span class="empty-lines hexagram-lines" aria-hidden="true"><i class="is-yang"></i><i class="is-yin"></i><i class="is-yang"></i><i class="is-yin"></i><i class="is-yin"></i><i class="is-yang"></i></span>
          <p>数既陈，餐签在此显现。</p>
        </div>
        <div class="result-content" id="result-content" hidden>
          <section class="hexagram-result" aria-label="梅花易数卦象">
            <p id="calendar-context" class="calendar-context"></p>
            <figure class="primary-hexagram" aria-labelledby="primary-name">
              <div class="primary-hexagram-body">
                <div id="primary-upper" class="trigram primary-upper"></div>
                <div id="primary-lines" class="hexagram-lines" aria-label="本卦爻象"></div>
                <div id="primary-lower" class="trigram primary-lower"></div>
              </div>
              <figcaption>
                <p id="primary-name" class="primary-name"></p>
                <p id="primary-meta" class="primary-meta"></p>
              </figcaption>
            </figure>
            <div class="hexagram-relations">
              <p id="mutual-meta" class="mutual-meta"></p>
              <p id="moving-line-meta" class="moving-line-meta"></p>
            </div>
            <figure class="changed-hexagram">
              <div id="changed-lines" class="hexagram-lines changed-lines" aria-label="变卦爻象"></div>
              <figcaption>
                <p id="changed-meta" class="changed-meta"></p>
              </figcaption>
            </figure>
            <section class="hexagram-reading" aria-label="卦象解读">
              <p id="image-reading" class="image-reading"></p>
              <p id="food-cue" class="food-cue"></p>
              <p id="transition-cue" class="transition-cue"></p>
              <p id="formula-reading" class="formula-reading"></p>
            </section>
          </section>
          <p id="oracle-title" class="oracle-title"></p>
          <h2 id="result-title"></h2>
          <p id="meal-meta" class="meal-meta"></p>
          <div class="oracle-line"><span aria-hidden="true"></span><p id="oracle-line"></p></div>
          <p id="meal-reason" class="meal-reason"></p>
          <div class="result-actions">
            <button id="confirm-button" class="confirm-button" type="button">此餐可取</button>
            <button id="retry-button" class="retry-button" type="button">再演一卦</button>
          </div>
        </div>
      </section>

      <section class="food-log" aria-labelledby="food-log-title">
        <div class="food-log-heading">
          <p class="eyebrow">今朝食录</p>
          <h2 id="food-log-title">三餐有录</h2>
        </div>
        <ol class="log-slots">
          <li data-slot="早餐"><span>早餐</span><strong>尚未落笔</strong></li>
          <li data-slot="午餐"><span>午餐</span><strong>尚未落笔</strong></li>
          <li data-slot="晚餐"><span>晚餐</span><strong>尚未落笔</strong></li>
        </ol>
        <p id="daily-balance-tip" class="daily-balance-tip" aria-live="polite"></p>
      </section>

      <footer class="site-footer">
        <p>卦象呈现仅供娱乐。营养相关文字仅作日常饮食提示，不构成医疗建议。</p>
      </footer>
    </main>
    <aside id="menu-panel" class="menu-panel" aria-labelledby="menu-panel-title" hidden>
      <div class="menu-panel-inner" role="dialog" aria-modal="true" aria-labelledby="menu-panel-title">
        <header class="menu-panel-header">
          <div>
            <p class="eyebrow">本地食单簿</p>
            <h2 id="menu-panel-title">整饬你的餐品</h2>
            <p id="menu-count" class="menu-count"></p>
          </div>
          <button id="menu-close-button" class="menu-close-button" type="button" aria-label="关闭菜单管理">关闭</button>
        </header>
        <p class="menu-panel-note">所有内容仅保存在这台设备的浏览器中。起始模板均待你确认实际供应地点；启用后才会参与餐签。</p>
        <form id="menu-filters" class="menu-filters" aria-label="食单筛选" onsubmit="return false;">
          <fieldset id="menu-filter-zone" class="menu-filter-zone">
            <legend>范围</legend>
            <label><input type="radio" name="menu-zone" value="" checked><span>全部</span></label>
            <label><input type="radio" name="menu-zone" value="中国菜"><span>中餐</span></label>
            <label><input type="radio" name="menu-zone" value="世界料理"><span>世界料理</span></label>
          </fieldset>
          <label class="menu-filter-control" for="menu-filter-cuisine"><span>菜系</span><select id="menu-filter-cuisine"><option value="">全部菜系</option></select></label>
          <label class="menu-filter-control" for="menu-filter-family"><span>大类</span><select id="menu-filter-family"><option value="">全部大类</option></select></label>
          <label class="menu-filter-enabled" for="menu-filter-enabled"><input id="menu-filter-enabled" type="checkbox"><span>只看已启用</span></label>
          <label class="menu-filter-control menu-filter-search" for="menu-filter-query"><span>搜索</span><input id="menu-filter-query" type="search" placeholder="搜菜名或小类"></label>
          <button id="menu-filter-clear" class="menu-filter-clear" type="button">清除筛选</button>
          <p id="menu-filter-summary" class="menu-filter-summary" aria-live="polite"></p>
        </form>
        <div id="menu-list" class="menu-list" aria-live="polite"></div>
        <div class="menu-panel-actions">
          <button id="add-meal-button" class="confirm-button" type="button">新增餐品</button>
          <button id="reset-menu-button" class="retry-button" type="button">恢复起始菜单</button>
        </div>
      </div>
    </aside>
    <div id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
